<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layered Background Animation</title>
  <link rel="stylesheet" href="Background Animation.css" />
</head>
<body>
  <div class="container">
    <!-- Each layer separate, not nested -->
    <div class="layer layer1"></div>
    <div class="layer layer2"></div>
    <div class="layer layer3"></div>

    <!-- Text above all layers -->
    <h2><span>My First video on</span><br>AnimeJs</h2>
  </div>

  <!-- Anime.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="Background Animation.js"></script>
</body>
</html>
